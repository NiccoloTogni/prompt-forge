name: Build CV Ranker (Windows)

on:
  workflow_dispatch:   # run manually from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install prompt-forge openai python-dotenv pyinstaller

      - name: Build exe
        run: |
          pyinstaller --onefile --windowed --name "CV Ranker" cv_ranker.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-ranker-windows
          path: dist/CV Ranker.exe
