[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "ape-toolkit"
version = "0.1.0"
description = "Automatic Prompt Engineering — incrementally train system prompts from examples"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}

dependencies = []  # Core has zero dependencies — LLM client is user-provided

[project.optional-dependencies]
pdf = ["pdfplumber>=0.10", "pytesseract>=0.3", "Pillow>=10.0"]
excel = ["openpyxl>=3.1"]
docx = ["python-docx>=1.0"]
all = ["pdfplumber>=0.10", "pytesseract>=0.3", "Pillow>=10.0", "openpyxl>=3.1", "python-docx>=1.0"]
dev = ["pytest>=7.0", "pytest-cov", "ruff"]

[tool.setuptools.packages.find]
include = ["ape*"]

[tool.ruff]
line-length = 100
target-version = "py310"
